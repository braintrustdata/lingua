name: Update provider types

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to update"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - openai
          - anthropic
          - google

concurrency:
  group: update-provider-types
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  provider_matrix:
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.providers.outputs.providers }}

    steps:
      - name: Parse provider input
        id: providers
        env:
          REQUESTED_PROVIDER: ${{ inputs.provider || 'all' }}
        run: |
          set -euo pipefail
          case "$REQUESTED_PROVIDER" in
            all)
              providers='["openai","anthropic","google"]'
              ;;
            openai|anthropic|google)
              providers="[\"$REQUESTED_PROVIDER\"]"
              ;;
            *)
              echo "Unknown provider: $REQUESTED_PROVIDER" >&2
              exit 1
              ;;
          esac

          echo "providers=$providers" >> "$GITHUB_OUTPUT"
          echo "Will update providers: $providers"

  update-provider-types:
    needs: provider_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.provider_matrix.outputs.providers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          pnpm add -g quicktype

      - name: Update provider specifications and types
        id: generate
        continue-on-error: true
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/provider-type-generation.log"
          : > "$log_path"

          {
            echo
            echo "## Updating ${{ matrix.provider }}"
            ./pipelines/generate-provider-types.sh "${{ matrix.provider }}"
          } 2>&1 | tee -a "$log_path"

          echo "log_path=$log_path" >> "$GITHUB_OUTPUT"
          exit "${PIPESTATUS[0]}"

      - name: Repair failed generation
        id: repair
        if: steps.generate.outcome == 'failure'
        continue-on-error: true
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1.0.75
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: "true"
          display_report: "true"
          timeout_minutes: "20"
          claude_args: |
            --model claude-opus-4-6
            --max-turns 80
            --allowedTools "Read,Glob,Grep,LS,Bash,WebSearch,WebFetch,Edit,Write"
            --disallowedTools "MultiEdit,Replace,NotebookEditCell,mcp__github__create_issue,mcp__github__create_issue_comment,mcp__github__update_issue,mcp__github__create_pr,mcp__github__create_or_update_file,mcp__github__delete_file,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
          prompt: |
            # Goal

            The automated Lingua provider type update failed. Make one focused repair attempt so the regenerated provider types build, then leave the repository ready for the workflow to validate and open a PR.

            # Inputs

            - Provider requested: `${{ matrix.provider }}`
            - Generation/build log: `${{ steps.generate.outputs.log_path }}`

            # Local files to read first

            - `AGENTS.md`
            - `Makefile`
            - `pipelines/generate-provider-types.sh`
            - `crates/generate-types/src/main.rs`
            - Provider modules under `crates/lingua/src/providers/${{ matrix.provider }}/`

            # Process

            1. Read the log and identify whether the failure is a local Rust/type-generation/build problem.
            2. If the failure is a transient network, provider API, package install, or external service failure, do not work around it with fake data or fallback content.
            3. If the failure is a local generation or compile issue, fix the smallest responsible source area.
            4. Prefer fixing generation logic in `crates/generate-types/` or typed provider adapters/converters. Do not manually edit files named `generated.rs`.
            5. Keep typed boundaries: deserialize into typed structs/enums instead of adding raw `serde_json::Value` field-plucking for provider semantics.
            6. Rerun the relevant generation/build command if you changed generation logic so generated outputs reflect the fix.
            7. Do not create or update GitHub issues, comments, pull requests, or branches.

            # Output

            Leave code changes in the working tree only. The workflow will run TypeScript type generation, formatting, build validation, and PR creation after this step.

      - name: Re-run provider update after repair
        id: retry
        if: steps.generate.outcome == 'failure'
        continue-on-error: true
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/provider-type-generation.retry.log"
          : > "$log_path"

          {
            echo
            echo "## Updating ${{ matrix.provider }}"
            ./pipelines/generate-provider-types.sh "${{ matrix.provider }}"
          } 2>&1 | tee -a "$log_path"

          exit "${PIPESTATUS[0]}"

      - name: Generate TypeScript types
        id: ts_types
        continue-on-error: true
        run: make generate-types

      - name: Build branch name
        id: branch
        run: |
          set -euo pipefail
          short_sha=$(git rev-parse --short=8 HEAD)
          echo "name=update-${{ matrix.provider }}-provider-types-${short_sha}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in provider types"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changes detected:"
          git status --short

      - name: Review generated provider integration
        id: integration_review
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@df37d2f0760a4b5683a6e617c9325bc1a36443f6 # v1.0.75
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          show_full_output: "true"
          display_report: "true"
          timeout_minutes: "30"
          claude_args: |
            --model claude-opus-4-6
            --max-turns 100
            --allowedTools "Read,Glob,Grep,LS,Bash,WebSearch,WebFetch,Edit,Write"
            --disallowedTools "MultiEdit,Replace,NotebookEditCell,mcp__github__create_issue,mcp__github__create_issue_comment,mcp__github__update_issue,mcp__github__create_pr,mcp__github__create_or_update_file,mcp__github__delete_file,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
          prompt: |
            # Goal

            The automated Lingua provider type update produced changes for `${{ matrix.provider }}`. Review the generated provider type diff for semantic integration gaps, update the hand-written adapter/converter code when needed, and add focused tests for clear behavior.

            This step should run even when generation, build, and clippy currently pass. A compiling generated enum or field can still require normalization code changes.

            # Local files to read first

            - `AGENTS.md`
            - `Makefile`
            - `crates/lingua/src/providers/${{ matrix.provider }}/`
            - `crates/lingua/src/universal/`
            - `crates/coverage-report/README.md`
            - `payloads/README.md`

            # Process

            1. Inspect `git diff` for `${{ matrix.provider }}` provider type updates, especially new enum variants, renamed wire values, new required fields, and response/request shape changes.
            2. Trace each changed generated provider type into hand-written adapter/converter code under `crates/lingua/src/providers/${{ matrix.provider }}/`.
            3. If a new provider value clearly maps to an existing universal concept, update the typed converter/adapter and add a focused Rust test. For example, new safety/filtering finish reasons should normalize to the existing content-filter path rather than falling through to `Other`.
            4. If the universal representation is ambiguous or cannot represent the provider feature non-lossily, do not invent a workaround. Leave the generated changes intact and add a concise note in `provider-type-update-notes.md` explaining what needs human clarification.
            5. Keep typed boundaries: deserialize into typed structs/enums instead of adding raw `serde_json::Value` field-plucking for provider semantics.
            6. Do not manually edit files named `generated.rs`.
            7. Run the most focused test or build command that validates any hand-written change you make. If the command cannot run because credentials or external services are missing, note that in `provider-type-update-notes.md`.
            8. Do not create or update GitHub issues, comments, pull requests, or branches.

            # Output

            Leave code changes in the working tree only. The workflow will regenerate TypeScript bindings, format, validate, and open a PR after this step.

      - name: Regenerate TypeScript types after integration review
        id: post_review_ts_types
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: make generate-types

      - name: Format code
        id: fmt
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: cargo fmt --all

      - name: Validate build
        id: build
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          cargo build --all-features

      - name: Run clippy
        id: clippy
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check typed boundaries
        id: typed_boundary
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: make typed-boundary-check

      - name: Run cross-provider transform guard
        id: cross_provider
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: cargo test -p coverage-report --test cross_provider_test cross_provider_transformations_have_no_unexpected_failures

      - name: Build PR body
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          set -euo pipefail
          {
            echo "Automated update of Lingua provider types."
            echo
            echo "Provider: \`${{ matrix.provider }}\`"
            echo
            echo "**Validation**"
            echo
            echo "- \`./pipelines/generate-provider-types.sh ${{ matrix.provider }}\`: ${{ steps.generate.outcome }}"
            if [ "${{ steps.generate.outcome }}" = "failure" ]; then
              echo "- Claude repair pass: ${{ steps.repair.outcome }}"
              echo "- Retry \`./pipelines/generate-provider-types.sh ${{ matrix.provider }}\`: ${{ steps.retry.outcome }}"
            fi
            echo "- \`make generate-types\`: ${{ steps.ts_types.outcome }}"
            echo "- Claude integration review: ${{ steps.integration_review.outcome }}"
            echo "- Post-review \`make generate-types\`: ${{ steps.post_review_ts_types.outcome }}"
            echo "- \`cargo fmt --all\`: ${{ steps.fmt.outcome }}"
            echo "- \`cargo build --all-features\`: ${{ steps.build.outcome }}"
            echo "- \`cargo clippy --all-targets --all-features -- -D warnings\`: ${{ steps.clippy.outcome }}"
            echo "- \`make typed-boundary-check\`: ${{ steps.typed_boundary.outcome }}"
            echo "- \`cargo test -p coverage-report --test cross_provider_test cross_provider_transformations_have_no_unexpected_failures\`: ${{ steps.cross_provider.outcome }}"
            echo
            echo "This PR is created even when validation fails so the generated update and repair attempt are available for manual follow-up."
          } > "$RUNNER_TEMP/update-provider-types-pr-body.md"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ github.token }}
          base: main
          branch: ${{ steps.branch.outputs.name }}
          commit-message: "Update ${{ matrix.provider }} provider types"
          title: "Update ${{ matrix.provider }} provider types"
          body-path: ${{ runner.temp }}/update-provider-types-pr-body.md
          labels: auto-sync
          delete-branch: true
          signoff: false

      - name: Fail after PR creation if validation failed
        if: >-
          steps.changes.outputs.has_changes == 'true' &&
          (
            steps.generate.outcome == 'failure' ||
            steps.retry.outcome == 'failure' ||
            steps.ts_types.outcome == 'failure' ||
            steps.integration_review.outcome == 'failure' ||
            steps.post_review_ts_types.outcome == 'failure' ||
            steps.fmt.outcome == 'failure' ||
            steps.build.outcome == 'failure' ||
            steps.clippy.outcome == 'failure' ||
            steps.typed_boundary.outcome == 'failure' ||
            steps.cross_provider.outcome == 'failure'
          )
        run: |
          echo "Provider type update PR was created, but one or more validation steps failed." >&2
          exit 1

      - name: Summary
        run: |
          set -euo pipefail
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "Provider types changed; PR creation step ran."
          else
            echo "Provider types are already up to date."
          fi
