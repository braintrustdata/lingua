name: Update provider types

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider to update"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - openai
          - anthropic
          - google

concurrency:
  group: update-provider-types
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  provider_matrix:
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.providers.outputs.providers }}

    steps:
      - name: Parse provider input
        id: providers
        env:
          REQUESTED_PROVIDER: ${{ inputs.provider || 'all' }}
        run: |
          set -euo pipefail
          case "$REQUESTED_PROVIDER" in
            all)
              providers='["openai","anthropic","google"]'
              ;;
            openai|anthropic|google)
              providers="[\"$REQUESTED_PROVIDER\"]"
              ;;
            *)
              echo "Unknown provider: $REQUESTED_PROVIDER" >&2
              exit 1
              ;;
          esac

          echo "providers=$providers" >> "$GITHUB_OUTPUT"
          echo "Will update providers: $providers"

  update-provider-types:
    needs: provider_matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJSON(needs.provider_matrix.outputs.providers) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt, clippy

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10.33.0

      - name: Cache cargo registry
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          npm install -g braintrust
          pnpm add -g quicktype

      - name: Create Braintrust workflow trace
        id: braintrust_trace
        continue-on-error: true
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: lingua-provider-type-updates
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          NODE_PATH="$(npm root -g)" node .github/scripts/braintrust-provider-types.mjs create-workflow-trace

      - name: Update provider specifications and types
        id: generate
        continue-on-error: true
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/provider-type-generation.log"
          : > "$log_path"

          set +e
          {
            echo
            echo "## Updating ${{ matrix.provider }}"
            ./pipelines/generate-provider-types.sh "${{ matrix.provider }}"
          } 2>&1 | tee -a "$log_path"
          generate_status="${PIPESTATUS[0]}"
          set -e

          echo "log_path=$log_path" >> "$GITHUB_OUTPUT"
          exit "$generate_status"

      - name: Snapshot Braintrust trace for repair
        id: repair_task_trace
        if: steps.generate.outcome == 'failure'
        continue-on-error: true
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: lingua-provider-type-updates
          BRAINTRUST_PARENT_SPAN_ID: ${{ steps.braintrust_trace.outputs.span_id }}
          BRAINTRUST_ROOT_SPAN_ID: ${{ steps.braintrust_trace.outputs.root_span_id }}
          PROVIDER: ${{ matrix.provider }}
          TRACE_PHASE: repair failed generation
        run: |
          set -euo pipefail
          NODE_PATH="$(npm root -g)" node .github/scripts/braintrust-provider-types.mjs create-task-trace

      - name: Load repair messages from Braintrust
        id: repair_messages
        if: steps.generate.outcome == 'failure'
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: lingua-provider-type-updates
          PROMPT_PHASE: repair
          PROVIDER: ${{ matrix.provider }}
          GENERATION_LOG_PATH: ${{ steps.generate.outputs.log_path }}
        run: |
          set -euo pipefail
          NODE_PATH="$(npm root -g)" node .github/scripts/braintrust-provider-types.mjs load-action-messages

      - name: Repair failed generation
        id: repair
        if: steps.generate.outcome == 'failure'
        continue-on-error: true
        timeout-minutes: 20
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1.0.140
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          display_report: "true"
          plugin_marketplaces: |
            https://github.com/braintrustdata/braintrust-claude-plugin.git
          plugins: |
            trace-claude-code@braintrust-claude-plugin
          settings: |
            {
              "env": {
                "TRACE_TO_BRAINTRUST": "${{ (steps.repair_task_trace.outputs.root_span_id != '' || steps.braintrust_trace.outputs.root_span_id != '') && 'true' || 'false' }}",
                "BRAINTRUST_CC_PROJECT": "lingua-provider-type-updates",
                "BRAINTRUST_API_KEY": "${{ secrets.BRAINTRUST_API_KEY }}",
                "CC_PARENT_SPAN_ID": "${{ steps.repair_task_trace.outputs.span_id || steps.braintrust_trace.outputs.span_id }}",
                "CC_ROOT_SPAN_ID": "${{ steps.repair_task_trace.outputs.root_span_id || steps.braintrust_trace.outputs.root_span_id }}",
                "BRAINTRUST_DEBUG": "false"
              }
            }
          claude_args: |
            --model claude-opus-4-8
            --max-turns 80
            --append-system-prompt ${{ steps.repair_messages.outputs.system_message_arg }}
            --allowedTools "Read,Glob,Grep,LS,Bash,WebSearch,WebFetch,Edit,Write"
            --disallowedTools "MultiEdit,Replace,NotebookEditCell,mcp__github__create_issue,mcp__github__create_issue_comment,mcp__github__update_issue,mcp__github__create_pr,mcp__github__create_or_update_file,mcp__github__delete_file,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
          prompt: ${{ steps.repair_messages.outputs.user_message }}

      - name: Re-run provider update after repair
        id: retry
        if: steps.generate.outcome == 'failure'
        continue-on-error: true
        run: |
          set -o pipefail
          log_path="$RUNNER_TEMP/provider-type-generation.retry.log"
          : > "$log_path"

          {
            echo
            echo "## Updating ${{ matrix.provider }}"
            ./pipelines/generate-provider-types.sh "${{ matrix.provider }}"
          } 2>&1 | tee -a "$log_path"

          exit "${PIPESTATUS[0]}"

      - name: Generate TypeScript types
        id: ts_types
        continue-on-error: true
        run: make generate-types

      - name: Build branch name
        id: branch
        run: |
          set -euo pipefail
          short_sha=$(git rev-parse --short=8 HEAD)
          echo "name=update-${{ matrix.provider }}-provider-types-${short_sha}-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Check for changes
        id: changes
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in provider types"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          echo "Changes detected:"
          git status --short

      - name: Snapshot Braintrust trace for integration review
        id: integration_review_task_trace
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: lingua-provider-type-updates
          BRAINTRUST_PARENT_SPAN_ID: ${{ steps.braintrust_trace.outputs.span_id }}
          BRAINTRUST_ROOT_SPAN_ID: ${{ steps.braintrust_trace.outputs.root_span_id }}
          PROVIDER: ${{ matrix.provider }}
          TRACE_PHASE: review generated provider integration
        run: |
          set -euo pipefail
          NODE_PATH="$(npm root -g)" node .github/scripts/braintrust-provider-types.mjs create-task-trace

      - name: Load review messages from Braintrust
        id: review_messages
        if: steps.changes.outputs.has_changes == 'true'
        env:
          BRAINTRUST_API_KEY: ${{ secrets.BRAINTRUST_API_KEY }}
          BRAINTRUST_PROJECT: lingua-provider-type-updates
          PROMPT_PHASE: review
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          NODE_PATH="$(npm root -g)" node .github/scripts/braintrust-provider-types.mjs load-action-messages

      - name: Review generated provider integration
        id: integration_review
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        timeout-minutes: 30
        uses: anthropics/claude-code-action@fbda2eb1bdc90d319b8d853f5deb53bca199a7c1 # v1.0.140
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ github.token }}
          display_report: "true"
          plugin_marketplaces: |
            https://github.com/braintrustdata/braintrust-claude-plugin.git
          plugins: |
            trace-claude-code@braintrust-claude-plugin
          settings: |
            {
              "env": {
                "TRACE_TO_BRAINTRUST": "${{ (steps.integration_review_task_trace.outputs.root_span_id != '' || steps.braintrust_trace.outputs.root_span_id != '') && 'true' || 'false' }}",
                "BRAINTRUST_CC_PROJECT": "lingua-provider-type-updates",
                "BRAINTRUST_API_KEY": "${{ secrets.BRAINTRUST_API_KEY }}",
                "CC_PARENT_SPAN_ID": "${{ steps.integration_review_task_trace.outputs.span_id || steps.braintrust_trace.outputs.span_id }}",
                "CC_ROOT_SPAN_ID": "${{ steps.integration_review_task_trace.outputs.root_span_id || steps.braintrust_trace.outputs.root_span_id }}",
                "BRAINTRUST_DEBUG": "false"
              }
            }
          claude_args: |
            --model claude-opus-4-8
            --max-turns 100
            --append-system-prompt ${{ steps.review_messages.outputs.system_message_arg }}
            --allowedTools "Read,Glob,Grep,LS,Bash,WebSearch,WebFetch,Edit,Write"
            --disallowedTools "MultiEdit,Replace,NotebookEditCell,mcp__github__create_issue,mcp__github__create_issue_comment,mcp__github__update_issue,mcp__github__create_pr,mcp__github__create_or_update_file,mcp__github__delete_file,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
          prompt: ${{ steps.review_messages.outputs.user_message }}

      - name: Regenerate TypeScript types after integration review
        id: post_review_ts_types
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: make generate-types

      - name: Format code
        id: fmt
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: cargo fmt --all

      - name: Validate build
        id: build
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: |
          set -euo pipefail
          cargo build --all-features

      - name: Run clippy
        id: clippy
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check typed boundaries
        id: typed_boundary
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: make typed-boundary-check

      - name: Run cross-provider transform guard
        id: cross_provider
        if: steps.changes.outputs.has_changes == 'true'
        continue-on-error: true
        run: cargo test -p coverage-report --test cross_provider_test cross_provider_transformations_have_no_unexpected_failures

      - name: Build PR body
        if: steps.changes.outputs.has_changes == 'true'
        env:
          BRAINTRUST_PROJECT: lingua-provider-type-updates
          BRAINTRUST_ROOT_SPAN_ID: ${{ steps.braintrust_trace.outputs.root_span_id }}
          BRAINTRUST_SPAN_ID: ${{ steps.braintrust_trace.outputs.span_id }}
          PROVIDER: ${{ matrix.provider }}
        run: |
          set -euo pipefail
          {
            if [ -n "$BRAINTRUST_ROOT_SPAN_ID" ] && [ -n "$BRAINTRUST_SPAN_ID" ]; then
              NODE_PATH="$(npm root -g)" node .github/scripts/braintrust-provider-types.mjs emit-pr-metadata
              echo
            fi
            echo "Automated update of Lingua provider types."
            echo
            echo "Provider: \`${{ matrix.provider }}\`"
            echo
            echo "Feedback: comment \`/bt good\` or \`/bt bad\` to log review feedback to the Braintrust trace."
            echo
            echo "**Validation**"
            echo
            echo "- \`./pipelines/generate-provider-types.sh ${{ matrix.provider }}\`: ${{ steps.generate.outcome }}"
            if [ "${{ steps.generate.outcome }}" = "failure" ]; then
              echo "- Claude repair pass: ${{ steps.repair.outcome }}"
              echo "- Retry \`./pipelines/generate-provider-types.sh ${{ matrix.provider }}\`: ${{ steps.retry.outcome }}"
            fi
            echo "- \`make generate-types\`: ${{ steps.ts_types.outcome }}"
            echo "- Braintrust workflow trace: ${{ steps.braintrust_trace.outcome }}"
            echo "- Claude integration review: ${{ steps.integration_review.outcome }}"
            echo "- Post-review \`make generate-types\`: ${{ steps.post_review_ts_types.outcome }}"
            echo "- \`cargo fmt --all\`: ${{ steps.fmt.outcome }}"
            echo "- \`cargo build --all-features\`: ${{ steps.build.outcome }}"
            echo "- \`cargo clippy --all-targets --all-features -- -D warnings\`: ${{ steps.clippy.outcome }}"
            echo "- \`make typed-boundary-check\`: ${{ steps.typed_boundary.outcome }}"
            echo "- \`cargo test -p coverage-report --test cross_provider_test cross_provider_transformations_have_no_unexpected_failures\`: ${{ steps.cross_provider.outcome }}"
            echo
            echo "This PR is created even when validation fails so the generated update and repair attempt are available for manual follow-up."
          } > "$RUNNER_TEMP/update-provider-types-pr-body.md"

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          token: ${{ github.token }}
          base: main
          branch: ${{ steps.branch.outputs.name }}
          commit-message: "Update ${{ matrix.provider }} provider types"
          title: "Update ${{ matrix.provider }} provider types"
          body-path: ${{ runner.temp }}/update-provider-types-pr-body.md
          labels: auto-sync
          delete-branch: true
          signoff: false

      - name: Fail workflow if validation failed
        if: >-
          (
            (steps.generate.outcome == 'failure' && steps.retry.outcome != 'success') ||
            steps.retry.outcome == 'failure' ||
            (steps.ts_types.outcome == 'failure' && steps.post_review_ts_types.outcome != 'success') ||
            steps.integration_review.outcome == 'failure' ||
            steps.post_review_ts_types.outcome == 'failure' ||
            steps.fmt.outcome == 'failure' ||
            steps.build.outcome == 'failure' ||
            steps.clippy.outcome == 'failure' ||
            steps.typed_boundary.outcome == 'failure' ||
            steps.cross_provider.outcome == 'failure'
          )
        run: |
          echo "Provider type update failed validation. If changes were produced, the PR creation step already ran." >&2
          exit 1

      - name: Summary
        run: |
          set -euo pipefail
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "Provider types changed; PR creation step ran."
          elif [ "${{ steps.generate.outcome }}" = "failure" ]; then
            echo "Provider types are unchanged after a recovered generation failure."
          else
            echo "Provider types are already up to date."
          fi
