packages:
  - payloads
  - bindings/lingua-wasm
  - bindings/typescript-types
  - bindings/typescript
  - examples/typescript
  - tools/quicktype

ignoredBuiltDependencies:
  - "@google/genai"
  - "@swc/core"
  - esbuild
  - protobufjs
  - sqlite3

strictDepBuilds: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
# Ignore the check for packages published more than 30 days ago (pnpm 10.27+)
# Useful for older packages that pre-date provenance support
trustPolicyIgnoreAfter: 43200 # minutes (30 days)
minimumReleaseAge: 4320 # 3 days (in minutes)
minimumReleaseAgeExclude:
  - quicktype
  - quicktype-core
  - quicktype-graphql-input
  - quicktype-typescript-input

overrides:
  tar: 7.5.11
  "@mikro-orm/knex": 6.6.14
  "@tootallnate/once": ^3.0.1
  uuid: ^11.1.1
  ip-address: ^10.1.1
  brace-expansion: ^5.0.6

patchedDependencies:
  quicktype-core@24.0.2: patches/quicktype-core@24.0.2.patch
